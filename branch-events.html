<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branch Events • SGBIT Events | SGBIT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f9fafc; color: #1e293b; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
    
    /* Navbar */
    .navbar {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      padding: 1rem 0;
    }
    .nav-flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .logo h2 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6, #d946ef);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      color: #334155;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #8b5cf6;
    }
    
    /* Hero */
    .branch-hero {
      background: linear-gradient(125deg, #ffffff, #f5f3ff);
      padding: 2.5rem 0;
      text-align: center;
    }
    .branch-hero h1 {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1e293b, #4c1d95);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    /* Quick Book Button */
    .quick-book-wrapper {
      text-align: center;
      margin: 1.5rem 0;
    }
    .quick-book-btn {
      display: inline-block;
      background: linear-gradient(135deg, #8b5cf6, #d946ef);
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }
    .quick-book-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(139, 92, 246, 0.4);
    }
    
    /* Filter Bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin: 2rem 0;
    }
    .filter-btn {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #8b5cf6;
      color: white;
    }
    
    /* Branch Cards Grid */
    .branches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin: 2rem 0 3rem;
    }
    .branch-card {
      background: white;
      border-radius: 1.6rem;
      overflow: hidden;
      box-shadow: 0 12px 25px -12px rgba(0,0,0,0.08);
      transition: 0.25s;
      cursor: pointer;
    }
    .branch-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -12px rgba(139, 92, 246, 0.2);
    }
    .card-img {
      height: 170px;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .dept-tag {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      color: white;
    }
    .card-content {
      padding: 1.2rem;
    }
    .branch-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .event-badge {
      display: inline-block;
      background: #ede9fe;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #6d28d9;
      margin: 0.5rem 0;
    }
    .event-list {
      list-style: none;
      margin: 12px 0;
    }
    .event-list li {
      font-size: 0.85rem;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 0.8rem;
    }
    .btn-outline-sm, .btn-primary-sm {
      flex: 1;
      padding: 8px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
      font-family: 'Inter', sans-serif;
    }
    .btn-outline-sm {
      background: transparent;
      border: 1px solid #cbd5e1;
      color: #334155;
    }
    .btn-outline-sm:hover {
      border-color: #8b5cf6;
      color: #8b5cf6;
    }
    .btn-primary-sm {
      background: #8b5cf6;
      border: none;
      color: white;
    }
    .btn-primary-sm:hover {
      background: #7c3aed;
      transform: translateY(-2px);
    }
    
    .footer {
      background: #0f172a;
      color: #cbd5e1;
      padding: 2rem 0;
      margin-top: 2rem;
      border-radius: 2rem 2rem 0 0;
      text-align: center;
    }
    @media (max-width: 680px) {
      .container { padding: 0 20px; }
      .nav-flex { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="nav-flex">
      <div class="logo"><h2>SGBIT<span style="font-size:0.9rem;">Events</span></h2></div>
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="about.html"><i class="fas fa-landmark"></i> About</a>
        <a href="branch-events.html" class="active"><i class="fas fa-calendar-alt"></i> Branch Events</a>
        <a href="booking.html"><i class="fas fa-ticket-alt"></i> Book Events</a>
        <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
        <a href="register.html"><i class="fas fa-user-plus"></i> Register</a>
      </div>
    </div>
  </div>
</nav>

<div class="branch-hero">
  <div class="container">
    <h1><i class="fas fa-microchip"></i> Department Events</h1>
    <p>Explore technical fests, workshops & seminars by each branch</p>
  </div>
</div>

<div class="container">
  <!-- Quick Book Button -->
  <div class="quick-book-wrapper">
    <a href="booking.html" class="quick-book-btn">
      <i class="fas fa-calendar-plus"></i> 🎟️ Book Events Directly →
    </a>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">All Branches</button>
    <button class="filter-btn" data-filter="CSE">CSE</button>
    <button class="filter-btn" data-filter="CSBS">CSBS</button>
    <button class="filter-btn" data-filter="EC">EC</button>
    <button class="filter-btn" data-filter="EEE">EEE</button>
    <button class="filter-btn" data-filter="AIDS">AIDS</button>
    <button class="filter-btn" data-filter="BCA">BCA</button>
    <button class="filter-btn" data-filter="MCA">MCA</button>
    <button class="filter-btn" data-filter="MECHANICAL">Mechanical</button>
    <button class="filter-btn" data-filter="CIVIL">Civil</button>
  </div>

  <div class="branches-grid" id="branchesContainer"></div>
</div>

<footer class="footer">
  <div class="container">
    <p>© 2k26 SGBIT Events — Branch Events Hub | Book your spot now</p>
  </div>
</footer>

<script>
  const branches = [
    { id: "CSE", name: "Computer Science & Engineering", short: "CSE", icon: "fa-code", img: "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?w=500&auto=format", events: ["Code Wars Hackathon", "AI/ML Workshop", "Tech Symposium 2025"] },
    { id: "CSBS", name: "CS & Business Systems", short: "CSBS", icon: "fa-chart-line", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500&auto=format", events: ["Business Analytics Meet", "Fintech Conclave"] },
    { id: "EC", name: "Electronics & Communication", short: "EC", icon: "fa-microchip", img: "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=500&auto=format", events: ["Embedded Systems", "IoT Innovation Fest"] },
    { id: "EEE", name: "Electrical & Electronics", short: "EEE", icon: "fa-bolt", img: "https://images.unsplash.com/photo-1562408590-e32931084e23?w=500&auto=format", events: ["Smart Grid Seminar", "Renewable Energy Expo"] },
    { id: "AIDS", name: "AI & Data Science", short: "AIDS", icon: "fa-robot", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=500&auto=format", events: ["Generative AI Hackathon", "ML Marathon"] },
    { id: "BCA", name: "BCA", short: "BCA", icon: "fa-database", img: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=500&auto=format", events: ["Web Dev Challenge", "Digital Marketing Fest"] },
    { id: "MCA", name: "MCA", short: "MCA", icon: "fa-network-wired", img: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500&auto=format", events: ["Cloud & DevOps Summit", "Open Source Sprint"] },
    { id: "MECHANICAL", name: "Mechanical Engineering", short: "MECH", icon: "fa-cogs", img: "https://images.unsplash.com/photo-1581092335871-5c5d5f3f7b1a?w=500&auto=format", events: ["AutoCAD Design Fest", "Robotics Expo"] },
    { id: "CIVIL", name: "Civil Engineering", short: "CIVIL", icon: "fa-draw-polygon", img: "https://images.unsplash.com/photo-1571624436279-b272aff752b5?w=500&auto=format", events: ["Sustainable Construction", "Structural Design"] }
  ];

  function renderCards(filter = "all") {
    const container = document.getElementById('branchesContainer');
    let filtered = filter === "all" ? branches : branches.filter(b => b.id === filter);
    container.innerHTML = filtered.map(branch => `
      <div class="branch-card" data-branch-id="${branch.id}">
        <div class="card-img" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2)), url('${branch.img}');">
          <div class="dept-tag"><i class="fas ${branch.icon}"></i> ${branch.short}</div>
        </div>
        <div class="card-content">
          <div class="branch-name">${branch.name}</div>
          <div class="event-badge"><i class="fas fa-calendar-week"></i> upcoming events</div>
          <ul class="event-list">
            ${branch.events.slice(0, 2).map(ev => `<li><i class="fas fa-circle" style="font-size: 0.45rem;"></i> ${ev}</li>`).join('')}
          </ul>
          <div class="button-group">
            <button class="btn-outline-sm view-details" data-branch="${branch.id}"><i class="fas fa-eye"></i> Details</button>
            <button class="btn-primary-sm book-now-btn" data-branch="${branch.id}"><i class="fas fa-ticket-alt"></i> Book Now</button>
          </div>
        </div>
      </div>
    `).join('');

    // View Details (show alert with full events)
    document.querySelectorAll('.view-details').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const branchId = btn.getAttribute('data-branch');
        const branch = branches.find(b => b.id === branchId);
        alert(`📋 ${branch.name} Events:\n- ${branch.events.join('\n- ')}`);
      });
    });

    // Book Now - redirect to booking page with department pre-selected
    document.querySelectorAll('.book-now-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const branchId = btn.getAttribute('data-branch');
        window.location.href = `booking.html?dept=${branchId}`;
      });
    });

    // Card click - also redirect to booking
    document.querySelectorAll('.branch-card').forEach(card => {
      card.addEventListener('click', () => {
        const branchId = card.getAttribute('data-branch-id');
        window.location.href = `booking.html?dept=${branchId}`;
      });
    });
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards(btn.getAttribute('data-filter'));
    });
  });

  renderCards('all');
</script>
</body>
</html>
